<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <!-- صورة المعاينة لخارج الموقع -->
    <meta property="og:title" content="منصة شاكر الكردي | عروض الربح والخصومات">

    <meta property="og:image" content="IMG_3298.jpeg">

    <title>شــاكر الكــردي | المنصة الرسمية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-primary: #bf953f;
            --gold-light: #fcf6ba;
            --gold-dark: #b38728;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-light: #f8fafc;
            --accent-gradient: linear-gradient(135deg, #ff4d4d 0%, #f97316 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; position: relative; min-height: 100vh; }

        /* تأثير الدولارات المتساقطة (CSS ONLY) */
        .money-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.2; /* تعتيم خفيف جداً لعدم تشتيت الزائر */
        }

        .dollar-rain {
            position: absolute;
            top: -50px;
            color: #22c55e;
            font-size: 24px;
            font-weight: bold;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* توزيع الدولارات بشكل عشوائي */
        .dollar-rain:nth-child(1) { left: 10%; animation-duration: 5s; animation-delay: 0s; }
        .dollar-rain:nth-child(2) { left: 25%; animation-duration: 7s; animation-delay: 2s; }
        .dollar-rain:nth-child(3) { left: 40%; animation-duration: 6s; animation-delay: 1s; }
        .dollar-rain:nth-child(4) { left: 55%; animation-duration: 8s; animation-delay: 3s; }
        .dollar-rain:nth-child(5) { left: 70%; animation-duration: 5s; animation-delay: 0.5s; }
        .dollar-rain:nth-child(6) { left: 85%; animation-duration: 9s; animation-delay: 4s; }
        .dollar-rain:nth-child(7) { left: 95%; animation-duration: 6s; animation-delay: 2.5s; }

        /* الهيدر الذهبي الفخم */
        header { padding: 5rem 2rem; text-align: center; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border-bottom: 2px solid var(--gold-dark); margin-bottom: 3rem; }

        .premium-name {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            filter: drop-shadow(0px 5px 15px rgba(184, 134, 11, 0.4));
            animation: shine 4s infinite linear;
            background-size: 200% auto;
        }

        @keyframes shine { to { background-position: 200% center; } }
        .name-underline { width: 80px; height: 4px; background: linear-gradient(to right, #bf953f, #fcf6ba); margin: 15px auto; border-radius: 10px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem; }

        .card { background: var(--card-bg); border-radius: 25px; overflow: hidden; transition: 0.4s; border: 1px solid rgba(255, 255, 255, 0.05); text-decoration: none; display: block; backdrop-filter: blur(10px); }
        .card:hover { transform: translateY(-10px); border-color: var(--gold-primary); }

        .card-image { width: 100%; height: 230px; background-size: cover; background-position: center; }
        .card-content { padding: 1.8rem; text-align: center; }
        .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-light); }

        .btn { display: block; padding: 0.9rem; background: var(--accent-gradient); color: white; border-radius: 15px; font-weight: 700; }

        footer { text-align: center; padding: 4rem; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>
    <!-- خلفية الدولارات المتساقطة -->

        <div class="dollar-rain">$</div>
        <div class="dollar-rain">$</div>

    </header>

    <div class="container">

            <!-- تيمو -->

                    <div class="btn">احصل على البونص</div>

        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | شاكر الكردي</p>
    </footer>
</body>
</html>
