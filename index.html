<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة شاكر الكردي | عروض الربح</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --accent-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); line-height: 1.6; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(58, 123, 213, 0.1) 0%, transparent 50%); z-index: -1; }
        header { padding: 4rem 2rem; text-align: center; background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 3rem; }
        header h1 { font-size: 3rem; font-weight: 700; margin-bottom: 1rem; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { font-size: 1.2rem; color: #94a3b8; max-width: 600px; margin: 0 auto; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; transition: all 0.4s ease; border: 1px solid rgba(255, 255, 255, 0.05); text-decoration: none; display: block; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary-color); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        .card-image { width: 100%; height: 230px; background-size: cover; background-position: center; position: relative; }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, rgba(15, 23, 42, 0.9)); }
        .card-content { padding: 1.5rem; }
        .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-light); text-align: center; }
        .btn { display: block; padding: 0.8rem; background: var(--accent-gradient); color: white; border-radius: 12px; font-weight: 600; text-align: center; margin-top: 10px; }
        footer { text-align: center; padding: 3rem; border-top: 1px solid rgba(255, 255, 255, 0.1); color: #64748b; }
        @media (max-width: 768px) { header h1 { font-size: 2.2rem; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <header>
        <h1>منصة شاكر الكردي</h1>
        <p>بوابتك لأفضل عروض الربح والبرامج التقنية المختارة بعناية.</p>
    </header>

    <div class="container">
        <div class="grid">
            <!-- العرض الأول -->
            <a href="https://os8.me/7zkGST" class="card" target="_blank">
                <div class="card-image" style="background-image: url('IMG_3253.jpeg');">
                    <div class="card-overlay"></div>
                </div>
                <div class="card-content">
                    <h2 class="card-title">رابط ربح 100$</h2>
                    <div class="btn">اضغط هنا للربح</div>
                </div>
            </a>

            <!-- العرض الثاني -->
            <a href="https://os8.me/3MWHRz" class="card" target="_blank">
                <div class="card-image" style="background-image: url('IMG_3273.jpeg');">
                    <div class="card-overlay"></div>
                </div>
                <div class="card-content">
                    <h2 class="card-title">اربح 100$ بأقل من ساعة</h2>
                    <div class="btn">سجل الآن وابدأ الربح</div>
                </div>
            </a>
        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | شاكر الكردي</p>
    </footer>
</body>
</html>
