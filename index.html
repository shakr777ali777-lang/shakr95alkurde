    <style>
        :root {
            --gold-primary: #bf953f; --gold-light: #fcf6ba; --gold-dark: #b38728;
            --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.85);
            --accent-gradient: linear-gradient(135deg, #ff4d4d 0%, #f97316 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: #f8fafc; overflow-x: hidden; position: relative; }

        /* تأثير الدولارات المتساقطة الخلفي */
        .money-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.15; }
        .dollar-rain { position: absolute; top: -50px; color: #22c55e; font-size: 24px; animation: fall linear infinite; }
        @keyframes fall { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; } 
            10% { opacity: 1; } 
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } 
        }

        /* توزيع الدولارات */
        .dollar-rain:nth-child(1) { left: 5%; animation-duration: 6s; }
        .dollar-rain:nth-child(2) { left: 20%; animation-duration: 8s; animation-delay: 2s; }
        .dollar-rain:nth-child(3) { left: 45%; animation-duration: 7s; animation-delay: 1s; }
        .dollar-rain:nth-child(4) { left: 75%; animation-duration: 9s; animation-delay: 3s; }
        .dollar-rain:nth-child(5) { left: 90%; animation-duration: 5s; }

        header { padding: 5rem 2rem; text-align: center; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border-bottom: 2px solid var(--gold-dark); }
        
        .premium-name {
            font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s infinite linear; background-size: 200% auto;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .container { max-width: 1200px; margin: 3rem auto; padding: 0 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }

        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; transition: 0.4s; border: 1px solid rgba(255, 255, 255, 0.1); text-decoration: none; display: block; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold-primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .card-image { width: 100%; height: 200px; background-size: cover; background-position: center; }
        .card-content { padding: 1.5rem; text-align: center; }
        .btn { display: block; padding: 0.8rem; background: var(--accent-gradient); color: white; border-radius: 12px; font-weight: 700; margin-top: 10px; }
    </style>
</head>
