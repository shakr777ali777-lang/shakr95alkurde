<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>روابط الربح الخاصة بي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(165deg, #6d28d9 0%, #4c1d95 35%, #1e3a8a 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            background: #a855f7;
            top: -100px;
            right: -80px;
        }

        body::after {
            background: #3b82f6;
            bottom: -100px;
            left: -80px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin: 24px 0 36px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.1));
            border-radius: 24px;
            display: grid;
            place-items: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .avatar svg {
            width: 38px;
            height: 38px;
            stroke: white;
            stroke-width: 2;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 15px;
            font-weight: 500;
            opacity: 0.85;
            color: #e0e7ff;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: #ffffff;
            color: #1e1b4b;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 20px;
            box-shadow: 
                0 4px 6px rgba(0,0,0,0.07),
                0 10px 20px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,1);
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
            pointer-events: none;
        }

        .link-btn:active {
            transform: scale(0.98);
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 12px rgba(0,0,0,0.1),
                0 16px 30px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,1);
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        .btn-icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            background: linear-gradient(135deg, #ede9fe, #dbeafe);
        }

        .btn-icon-wrap svg {
            width: 24px;
            height: 24px;
        }

        .btn-text {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
        }

        .btn-arrow {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f3ff;
            display: grid;
            place-items: center;
            color: #5b21b6;
            flex-shrink: 0;
            transition: all 0.25s;
        }

        .link-btn:hover .btn-arrow {
            background: #5b21b6;
            color: white;
            transform: translateX(-3px);
        }

        .btn-arrow svg {
            width: 20px;
            height: 20px;
            stroke-width: 2.5;
        }

        /* ألوان مختلفة لكل زر */
        .link-btn:nth-child(1) .btn-icon-wrap { background: linear-gradient(135deg, #fef3c7, #fde68a); }
        .link-btn:nth-child(1) .btn-icon-wrap svg { stroke: #d97706; fill: #d97706; }
        
        .link-btn:nth-child(2) .btn-icon-wrap { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
        .link-btn:nth-child(2) .btn-icon-wrap svg { stroke: #16a34a; fill: #16a34a; }
        
        .link-btn:nth-child(3) .btn-icon-wrap { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
        .link-btn:nth-child(3) .btn-icon-wrap svg { stroke: #2563eb; fill: #2563eb; }
        
        .link-btn:nth-child(4) .btn-icon-wrap { background: linear-gradient(135deg, #fae8ff, #f5d0fe); }
        .link-btn:nth-child(4) .btn-icon-wrap svg { stroke: #c026d3; fill: #c026d3; }

        footer {
            text-align: center;
            margin-top: 32px;
            padding: 0 20px;
        }

        footer p {
            font-size: 13px;
            color: rgba(224, 231, 255, 0.7);
            font-weight: 500;
        }

        @media (max-width: 380px) {
            h1 { font-size: 24px; }
            .btn-text { font-size: 16px; }
            .link-btn { padding: 16px 18px; }
            .btn-icon-wrap { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.349m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 0 015.378 3h13.243a1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .414.336.75.75.75z"/>
                </svg>
            </div>
            <h1>روابط الربح الخاصة بي</h1>
            <p class="subtitle">اضغط على أي رابط للانتقال مباشرة</p>
        </header>

        <main class="links">
            <!-- الزر الأول -->
            <a href="https://os8.me/jwfWaF" target="_blank" rel="noopener noreferrer" class="link-btn">
                <div class="btn-content">
                    <div class="btn-icon-wrap">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                        </svg>
                    </div>
                    <span class="btn-text">رابط ربح الـ100$ الأول</span>
                </div>
                <div class="btn-arrow">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                    </svg>
                </div>
            </a>

            <!-- الزر الثاني -->
            <a href="https://os8.me/3MWHRz" target="_blank" rel="noopener noreferrer" class="link-btn">
                <div class="btn-content">
                    <div class="btn-icon-wrap">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                        </svg>
                    </div>
                    <span class="btn-text">رابط ربح الـ100$ الثاني</span>
                </div>
                <div class="btn-arrow">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                    </svg>
                </div>
            </a>

            <!-- الزر الثالث -->
            <a href="https://swcapp.com/i/shakralkurde" target="_blank" rel="noopener noreferrer" class="link-btn">
                <div class="btn-content">
                    <div class="btn-icon-wrap">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                        </svg>
                    </div>
                    <span class="btn-text">ربح 200$ من المشي</span>
                </div>
                <div class="btn-arrow">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                    </svg>
                </div>
            </a>

            <!-- الزر الرابع -->
            <a href="https://getblock.me/u/27348334" target="_blank" rel="noopener noreferrer" class="link-btn">
                <div class="btn-content">
                    <div class="btn-icon-wrap">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <span class="btn-text">10$ يومياً</span>
                </div>
                <div class="btn-arrow">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                    </svg>
                </div>
            </a>
        </main>

        <footer>
            <p>جميع الروابط تعمل مباشرة عند الضغط</p>
        </footer>
    </div>

    <script>
        // تأثير اهتزاز بسيط عند الضغط للموبايل
        document.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                if (navigator.vibrate) navigator.vibrate(10);
            });
        });
    </script>
</body>
</html>
