<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-primary: #bf953f;
            --gold-light: #fcf6ba;
            --gold-dark: #b38728;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --accent-gradient: linear-gradient(135deg, #ff4d4d 0%, #f97316 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); line-height: 1.6; overflow-x: hidden; }

        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(184, 134, 11, 0.1) 0%, transparent 50%); z-index: -1; }

        header { padding: 5rem 2rem; text-align: center; background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border-bottom: 2px solid var(--gold-dark); margin-bottom: 3rem; }

        .premium-name {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            filter: drop-shadow(0px 5px 15px rgba(184, 134, 11, 0.4));
            animation: shine 4s infinite linear;
            background-size: 200% auto;
            letter-spacing: -1px;
        }

        @keyframes shine { to { background-position: 200% center; } }
        .name-underline { width: 80px; height: 4px; background: linear-gradient(to right, #bf953f, #fcf6ba); margin: 15px auto; border-radius: 10px; box-shadow: 0 0 20px rgba(184, 134, 11, 0.6); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem; }

        .card { background: var(--card-bg); border-radius: 25px; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(255, 255, 255, 0.05); text-decoration: none; display: block; }
        .card:hover { transform: translateY(-15px); border-color: var(--gold-primary); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); }

        .card-image { width: 100%; height: 230px; background-size: cover; background-position: center; position: relative; }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, rgba(15, 23, 42, 0.9)); }

        .card-content { padding: 1.8rem; text-align: center; }
        .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-light); }

        .btn { display: block; padding: 0.9rem; background: var(--accent-gradient); color: white; border-radius: 15px; font-weight: 700; transition: 0.3s; }
        .card:hover .btn { transform: scale(1.05); box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }

        footer { text-align: center; padding: 4rem; border-top: 1px solid rgba(255, 255, 255, 0.1); color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

                    <div class="btn">احصل على البونص</div>
                </div>
            </a>

        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | شاکر أيمن علي (شاكر الكردي)</p>
    </footer>
</body>
</html>
